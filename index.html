<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hello World + Tetris</title>
  <style>
    :root { --bg:#0b1020; --card:#121a33; --line:#2a3357; --text:#e8eeff; --muted:#b8c2ff; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
      background: var(--bg);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 20px;
    }
    .card {
      width: min(980px, 100%);
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--card);
      box-shadow: 0 10px 30px rgba(0,0,0,.35);
      padding: 22px;
    }
    h1 { margin: 0 0 6px; font-size: clamp(28px, 5vw, 40px); }
    .sub { margin: 0 0 18px; color: var(--muted); }
    .layout { display: grid; grid-template-columns: auto 220px; gap: 18px; align-items: start; }
    canvas { background: #0a0f1f; border: 1px solid #32406b; border-radius: 10px; display:block; }
    .panel { border: 1px solid #2a3357; border-radius: 10px; padding: 12px; background:#0d1427; }
    .panel h3 { margin: 0 0 8px; font-size: 14px; }
    .meta { margin: 6px 0; color:#d6ddff; font-size:14px; }
    .keys { font-size: 12px; color: var(--muted); line-height: 1.45; }
    button {
      width: 100%; margin-top: 8px; border: 0; border-radius: 8px;
      padding: 8px 10px; font-weight: 700; cursor: pointer;
      background: #5eead4; color:#03261f;
    }
    .controls { margin-top:10px; display:grid; gap:8px; }
    .row { display:grid; grid-template-columns: repeat(3,1fr); gap:8px; }
    .ctl { border:1px solid #2b3a5f; background:#1b2846; color:#dbeafe; padding:8px; border-radius:8px; font-weight:700; cursor:pointer; }
    .ctl:active { transform: scale(0.98); }
    @media (max-width: 760px) { .layout { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="card">
    <h1>Hello, World!</h1>
    <p class="sub">built with openclaw + jungbong · 테트리스 추가 버전</p>

    <div class="layout">
      <canvas id="game" width="210" height="420" aria-label="Tetris game canvas"></canvas>

      <div class="panel">
        <h3>🎮 Tetris</h3>
        <div class="meta">점수: <strong id="score">0</strong></div>
        <div class="meta">레벨: <strong id="level">1</strong></div>
        <div class="meta">줄: <strong id="lines">0</strong></div>
        <button id="restart">새 게임</button>
        <div class="controls">
          <div class="row">
            <button class="ctl" id="btn-rot">회전</button>
            <button class="ctl" id="btn-up">▲</button>
            <button class="ctl" id="btn-drop">하드드롭</button>
          </div>
          <div class="row">
            <button class="ctl" id="btn-left">◀</button>
            <button class="ctl" id="btn-down">▼</button>
            <button class="ctl" id="btn-right">▶</button>
          </div>
        </div>
        <p class="keys">
          ←/→ 이동<br/>
          ↓ 빠르게 내리기<br/>
          ↑ 또는 X 회전<br/>
          Z 반대 회전<br/>
          Space 하드드롭<br/>
          P 일시정지
        </p>
      </div>
    </div>
  </div>

  <script>
    const COLS = 10, ROWS = 20, BLOCK = 21;
    const EMPTY = 0;

    const COLORS = [
      null,
      '#22d3ee', // I
      '#f59e0b', // L
      '#3b82f6', // J
      '#eab308', // O
      '#22c55e', // S
      '#a855f7', // T
      '#ef4444'  // Z
    ];

    const SHAPES = {
      I: [[1,1,1,1]],
      L: [[2,0,0],[2,2,2]],
      J: [[0,0,3],[3,3,3]],
      O: [[4,4],[4,4]],
      S: [[0,5,5],[5,5,0]],
      T: [[0,6,0],[6,6,6]],
      Z: [[7,7,0],[0,7,7]]
    };

    const BAG = ['I','L','J','O','S','T','Z'];

    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    ctx.scale(BLOCK, BLOCK);

    const scoreEl = document.getElementById('score');
    const levelEl = document.getElementById('level');
    const linesEl = document.getElementById('lines');
    const restartBtn = document.getElementById('restart');

    function createBoard() {
      return Array.from({ length: ROWS }, () => Array(COLS).fill(EMPTY));
    }

    function clone(m) { return m.map(r => [...r]); }

    function rotate(matrix, dir = 1) {
      const res = matrix[0].map((_, i) => matrix.map(row => row[i]));
      return dir > 0 ? res.map(r => r.reverse()) : res.reverse();
    }

    function randomBag() {
      const b = [...BAG];
      for (let i = b.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [b[i], b[j]] = [b[j], b[i]];
      }
      return b;
    }

    let board, piece, bag, score, level, lines, dropInterval, dropCounter, lastTime, gameOver, paused;

    function resetState() {
      board = createBoard();
      bag = randomBag();
      score = 0; level = 1; lines = 0;
      dropInterval = 800;
      dropCounter = 0;
      lastTime = 0;
      gameOver = false;
      paused = false;
      spawnPiece();
      updateHUD();
    }

    function spawnPiece() {
      if (bag.length === 0) bag = randomBag();
      const type = bag.pop();
      piece = {
        matrix: clone(SHAPES[type]),
        x: Math.floor(COLS / 2) - Math.ceil(SHAPES[type][0].length / 2),
        y: 0
      };
      if (collide(board, piece)) gameOver = true;
    }

    function collide(board, p) {
      for (let y = 0; y < p.matrix.length; y++) {
        for (let x = 0; x < p.matrix[y].length; x++) {
          if (p.matrix[y][x] !== 0) {
            const by = y + p.y;
            const bx = x + p.x;
            if (by < 0 || by >= ROWS || bx < 0 || bx >= COLS || board[by][bx] !== 0) return true;
          }
        }
      }
      return false;
    }

    function merge(board, p) {
      p.matrix.forEach((row, y) => {
        row.forEach((val, x) => {
          if (val !== 0) board[y + p.y][x + p.x] = val;
        });
      });
    }

    function clearLines() {
      let cleared = 0;
      outer: for (let y = ROWS - 1; y >= 0; y--) {
        for (let x = 0; x < COLS; x++) {
          if (board[y][x] === 0) continue outer;
        }
        const row = board.splice(y, 1)[0].fill(0);
        board.unshift(row);
        y++;
        cleared++;
      }
      if (cleared > 0) {
        lines += cleared;
        const lineScores = [0, 100, 300, 500, 800];
        score += lineScores[cleared] * level;
        level = Math.floor(lines / 10) + 1;
        dropInterval = Math.max(120, 800 - (level - 1) * 60);
        updateHUD();
      }
    }

    function hardDrop() {
      while (!collide(board, { ...piece, y: piece.y + 1 })) piece.y++;
      lockPiece();
    }

    function lockPiece() {
      merge(board, piece);
      clearLines();
      spawnPiece();
      updateHUD();
    }

    function move(dx) {
      piece.x += dx;
      if (collide(board, piece)) piece.x -= dx;
    }

    function softDrop() {
      piece.y++;
      if (collide(board, piece)) {
        piece.y--;
        lockPiece();
      }
    }

    function rotatePiece(dir) {
      const old = piece.matrix;
      const rotated = rotate(piece.matrix, dir);
      const oldX = piece.x;
      piece.matrix = rotated;
      const kicks = [0, -1, 1, -2, 2];
      for (const k of kicks) {
        piece.x = oldX + k;
        if (!collide(board, piece)) return;
      }
      piece.matrix = old;
      piece.x = oldX;
    }

    function drawMatrix(matrix, offset) {
      matrix.forEach((row, y) => {
        row.forEach((value, x) => {
          if (value !== 0) {
            ctx.fillStyle = COLORS[value];
            ctx.fillRect(x + offset.x, y + offset.y, 1, 1);
            ctx.strokeStyle = 'rgba(255,255,255,.15)';
            ctx.strokeRect(x + offset.x, y + offset.y, 1, 1);
          }
        });
      });
    }

    function drawGrid() {
      ctx.strokeStyle = 'rgba(148,163,184,.12)';
      for (let x = 0; x <= COLS; x++) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, ROWS); ctx.stroke();
      }
      for (let y = 0; y <= ROWS; y++) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(COLS, y); ctx.stroke();
      }
    }

    function drawText(text) {
      ctx.save();
      ctx.scale(1 / BLOCK, 1 / BLOCK);
      ctx.fillStyle = 'rgba(0,0,0,.65)';
      ctx.fillRect(0, canvas.height / 2 - 40, canvas.width, 80);
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 28px system-ui';
      ctx.textAlign = 'center';
      ctx.fillText(text, canvas.width / 2, canvas.height / 2 + 10);
      ctx.restore();
    }

    function draw() {
      ctx.fillStyle = '#0a0f1f';
      ctx.fillRect(0, 0, COLS, ROWS);
      drawGrid();
      drawMatrix(board, { x: 0, y: 0 });
      if (!gameOver) drawMatrix(piece.matrix, { x: piece.x, y: piece.y });
      if (paused) drawText('PAUSED');
      if (gameOver) drawText('GAME OVER');
    }

    function updateHUD() {
      scoreEl.textContent = score;
      levelEl.textContent = level;
      linesEl.textContent = lines;
    }

    function update(time = 0) {
      const delta = time - lastTime;
      lastTime = time;
      if (!paused && !gameOver) {
        dropCounter += delta;
        if (dropCounter > dropInterval) {
          softDrop();
          dropCounter = 0;
        }
      }
      draw();
      requestAnimationFrame(update);
    }

    document.addEventListener('keydown', (e) => {
      if (gameOver && e.key.toLowerCase() !== 'p') return;
      if (e.key === 'ArrowLeft') move(-1);
      else if (e.key === 'ArrowRight') move(1);
      else if (e.key === 'ArrowDown') softDrop();
      else if (e.key === 'ArrowUp' || e.key.toLowerCase() === 'x') rotatePiece(1);
      else if (e.key.toLowerCase() === 'z') rotatePiece(-1);
      else if (e.code === 'Space') { e.preventDefault(); hardDrop(); }
      else if (e.key.toLowerCase() === 'p') paused = !paused;
      draw();
    });

    restartBtn.addEventListener('click', () => resetState());

    const btnLeft = document.getElementById('btn-left');
    const btnRight = document.getElementById('btn-right');
    const btnDown = document.getElementById('btn-down');
    const btnUp = document.getElementById('btn-up');
    const btnRot = document.getElementById('btn-rot');
    const btnDrop = document.getElementById('btn-drop');

    btnLeft?.addEventListener('click', () => { move(-1); draw(); });
    btnRight?.addEventListener('click', () => { move(1); draw(); });
    btnDown?.addEventListener('click', () => { softDrop(); draw(); });
    btnUp?.addEventListener('click', () => { rotatePiece(1); draw(); });
    btnRot?.addEventListener('click', () => { rotatePiece(1); draw(); });
    btnDrop?.addEventListener('click', () => { hardDrop(); draw(); });

    resetState();
    update();
  </script>
</body>
</html>
